<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="900" viewBox="0 0 1200 900">
  <style>
    .title {
      font-family: Arial, sans-serif;
      font-size: 24px;
      font-weight: bold;
      text-anchor: middle;
    }
    .subtitle {
      font-family: Arial, sans-serif;
      font-size: 18px;
      font-weight: bold;
      text-anchor: middle;
    }
    .label {
      font-family: Arial, sans-serif;
      font-size: 14px;
      text-anchor: middle;
    }
    .small-label {
      font-family: Arial, sans-serif;
      font-size: 12px;
      text-anchor: middle;
    }
    .flow-label {
      font-family: Arial, sans-serif;
      font-size: 11px;
      text-anchor: middle;
      fill: #333;
    }
    .component {
      stroke: #333;
      stroke-width: 2;
      fill: white;
    }
    .user {
      fill: #E9D8FD;
    }
    .frontend {
      fill: #BEE3F8;
    }
    .backend {
      fill: #C6F6D5;
    }
    .processing {
      fill: #FEEBC8;
    }
    .data {
      fill: #FED7D7;
    }
    .arrow {
      stroke: #666;
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrowhead);
    }
    .data-flow {
      stroke: #3182CE;
      stroke-width: 2;
      fill: none;
      marker-end: url(#data-arrowhead);
    }
    .control-flow {
      stroke: #DD6B20;
      stroke-width: 2;
      fill: none;
      marker-end: url(#control-arrowhead);
    }
    .background {
      fill: #F7FAFC;
      stroke: #E2E8F0;
      stroke-width: 1;
    }
  </style>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
    <marker id="data-arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182CE" />
    </marker>
    <marker id="control-arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DD6B20" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="900" fill="#F7FAFC" />

  <!-- Title -->
  <text x="600" y="40" class="title">Data Flow Diagram - Integrated Geospatial Application</text>

  <!-- User -->
  <ellipse cx="600" cy="100" rx="80" ry="40" class="component user" />
  <text x="600" y="105" class="label">User</text>

  <!-- Frontend Components -->
  <rect x="150" y="200" width="180" height="60" rx="5" ry="5" class="component frontend" />
  <text x="240" y="235" class="label">NextJS PWA</text>

  <rect x="400" y="200" width="180" height="60" rx="5" ry="5" class="component frontend" />
  <text x="490" y="235" class="label">QGIS Plugin</text>

  <rect x="650" y="200" width="180" height="60" rx="5" ry="5" class="component frontend" />
  <text x="740" y="235" class="label">Marimo Notebooks</text>

  <rect x="900" y="200" width="180" height="60" rx="5" ry="5" class="component frontend" />
  <text x="990" y="235" class="label">Script Repository</text>

  <!-- Backend Components -->
  <rect x="150" y="320" width="180" height="60" rx="5" ry="5" class="component backend" />
  <text x="240" y="355" class="label">FastAPI Core</text>

  <rect x="400" y="320" width="180" height="60" rx="5" ry="5" class="component backend" />
  <text x="490" y="355" class="label">Geospatial APIs</text>

  <rect x="650" y="320" width="180" height="60" rx="5" ry="5" class="component backend" />
  <text x="740" y="355" class="label">Workflow APIs</text>

  <rect x="900" y="320" width="180" height="60" rx="5" ry="5" class="component backend" />
  <text x="990" y="355" class="label">Integration APIs</text>

  <!-- Processing Components -->
  <rect x="150" y="440" width="180" height="60" rx="5" ry="5" class="component processing" />
  <text x="240" y="475" class="label">DuckDB Engine</text>

  <rect x="400" y="440" width="180" height="60" rx="5" ry="5" class="component processing" />
  <text x="490" y="475" class="label">Tippecanoe</text>

  <rect x="650" y="440" width="180" height="60" rx="5" ry="5" class="component processing" />
  <text x="740" y="475" class="label">Kestra Orchestrator</text>

  <rect x="900" y="440" width="180" height="60" rx="5" ry="5" class="component processing" />
  <text x="990" y="475" class="label">DLT Pipelines</text>

  <!-- Integration Components -->
  <rect x="150" y="560" width="180" height="60" rx="5" ry="5" class="component data" />
  <text x="240" y="595" class="label">PocketBase</text>

  <rect x="400" y="560" width="180" height="60" rx="5" ry="5" class="component data" />
  <text x="490" y="595" class="label">Martin MapLibre</text>

  <rect x="650" y="560" width="180" height="60" rx="5" ry="5" class="component data" />
  <text x="740" y="595" class="label">Box.com Connector</text>

  <rect x="900" y="560" width="180" height="60" rx="5" ry="5" class="component data" />
  <text x="990" y="595" class="label">OGR_FDW</text>

  <!-- Data Storage -->
  <rect x="150" y="680" width="180" height="60" rx="5" ry="5" class="component data" />
  <text x="240" y="715" class="label">PostgreSQL/PostGIS</text>

  <rect x="400" y="680" width="180" height="60" rx="5" ry="5" class="component data" />
  <text x="490" y="715" class="label">Vector Tiles</text>

  <rect x="650" y="680" width="180" height="60" rx="5" ry="5" class="component data" />
  <text x="740" y="715" class="label">File Storage</text>

  <rect x="900" y="680" width="180" height="60" rx="5" ry="5" class="component data" />
  <text x="990" y="715" class="label">Cloud Storage</text>

  <!-- External Systems -->
  <rect x="150" y="800" width="180" height="60" rx="5" ry="5" class="component" />
  <text x="240" y="835" class="label">External Databases</text>

  <rect x="400" y="800" width="180" height="60" rx="5" ry="5" class="component" />
  <text x="490" y="835" class="label">GeoServer/GeoNode</text>

  <rect x="650" y="800" width="180" height="60" rx="5" ry="5" class="component" />
  <text x="740" y="835" class="label">Box.com Cloud</text>

  <rect x="900" y="800" width="180" height="60" rx="5" ry="5" class="component" />
  <text x="990" y="835" class="label">Other Data Sources</text>

  <!-- User to Frontend Connections -->
  <path d="M570 130 L270 200" class="control-flow" />
  <text x="400" y="160" class="flow-label">User Interaction</text>

  <path d="M600 140 L490 200" class="control-flow" />
  <text x="530" y="170" class="flow-label">QGIS Operations</text>

  <path d="M630 130 L720 200" class="control-flow" />
  <text x="690" y="160" class="flow-label">Data Analysis</text>

  <path d="M650 120 L900 200" class="control-flow" />
  <text x="800" y="150" class="flow-label">Script Management</text>

  <!-- Frontend to Backend Connections -->
  <path d="M240 260 L240 320" class="data-flow" />
  <text x="270" y="290" class="flow-label">API Requests</text>

  <path d="M490 260 L490 320" class="data-flow" />
  <text x="520" y="290" class="flow-label">Geospatial Queries</text>

  <path d="M740 260 L740 320" class="data-flow" />
  <text x="770" y="290" class="flow-label">Workflow Execution</text>

  <path d="M990 260 L990 320" class="data-flow" />
  <text x="1020" y="290" class="flow-label">Integration Requests</text>

  <!-- Backend to Processing Connections -->
  <path d="M240 380 L240 440" class="data-flow" />
  <text x="270" y="410" class="flow-label">Query Execution</text>

  <path d="M490 380 L490 440" class="data-flow" />
  <text x="520" y="410" class="flow-label">Tile Generation</text>

  <path d="M740 380 L740 440" class="data-flow" />
  <text x="770" y="410" class="flow-label">Workflow Management</text>

  <path d="M990 380 L990 440" class="data-flow" />
  <text x="1020" y="410" class="flow-label">Pipeline Execution</text>

  <!-- Processing to Integration Connections -->
  <path d="M240 500 L240 560" class="data-flow" />
  <text x="270" y="530" class="flow-label">Real-time Updates</text>

  <path d="M490 500 L490 560" class="data-flow" />
  <text x="520" y="530" class="flow-label">Tile Serving</text>

  <path d="M740 500 L740 560" class="data-flow" />
  <text x="770" y="530" class="flow-label">File Operations</text>

  <path d="M990 500 L990 560" class="data-flow" />
  <text x="1020" y="530" class="flow-label">Foreign Data Access</text>

  <!-- Integration to Data Storage Connections -->
  <path d="M240 620 L240 680" class="data-flow" />
  <text x="270" y="650" class="flow-label">Data Storage</text>

  <path d="M490 620 L490 680" class="data-flow" />
  <text x="520" y="650" class="flow-label">Tile Storage</text>

  <path d="M740 620 L740 680" class="data-flow" />
  <text x="770" y="650" class="flow-label">File Management</text>

  <path d="M990 620 L990 680" class="data-flow" />
  <text x="1020" y="650" class="flow-label">Data Access</text>

  <!-- Data Storage to External Systems Connections -->
  <path d="M240 740 L240 800" class="data-flow" />
  <text x="270" y="770" class="flow-label">Database Connections</text>

  <path d="M490 740 L490 800" class="data-flow" />
  <text x="520" y="770" class="flow-label">Publishing</text>

  <path d="M740 740 L740 800" class="data-flow" />
  <text x="770" y="770" class="flow-label">Cloud Sync</text>

  <path d="M990 740 L990 800" class="data-flow" />
  <text x="1020" y="770" class="flow-label">Data Import/Export</text>

  <!-- Cross-Component Connections -->
  <!-- DuckDB to PostgreSQL -->
  <path d="M150 470 C100 500, 100 650, 150 700" class="data-flow" />
  <text x="80" y="580" class="flow-label">ETL Operations</text>

  <!-- Tippecanoe to Vector Tiles -->
  <path d="M490 500 L490 680" class="data-flow" />

  <!-- Kestra to DLT -->
  <path d="M830 470 L900 470" class="data-flow" />
  <text x="865" y="450" class="flow-label">Orchestration</text>

  <!-- DLT to PostgreSQL -->
  <path d="M900 470 C850 550, 300 600, 250 680" class="data-flow" />
  <text x="550" y="620" class="flow-label">Data Pipeline Results</text>

  <!-- Box.com to Cloud Storage -->
  <path d="M740 620 L900 680" class="data-flow" />
  <text x="830" y="640" class="flow-label">Cloud Files</text>

  <!-- OGR_FDW to PostgreSQL -->
  <path d="M900 590 C800 630, 300 630, 240 680" class="data-flow" />
  <text x="550" y="600" class="flow-label">Foreign Data Wrapper</text>

  <!-- PocketBase to NextJS -->
  <path d="M150 580 C100 450, 100 250, 150 230" class="data-flow" />
  <text x="60" y="400" class="flow-label">Real-time Updates</text>

  <!-- Backend Interconnections -->
  <path d="M330 350 L400 350" class="data-flow" />
  <path d="M580 350 L650 350" class="data-flow" />
  <path d="M830 350 L900 350" class="data-flow" />

  <!-- Legend -->
  <rect x="950" y="50" width="200" height="100" class="background" rx="5" ry="5" />
  <text x="1050" y="70" class="subtitle">Legend</text>
  
  <line x1="970" y1="90" x2="1000" y2="90" class="data-flow" />
  <text x="1060" y="95" class="flow-label">Data Flow</text>
  
  <line x1="970" y1="110" x2="1000" y2="110" class="control-flow" />
  <text x="1060" y="115" class="flow-label">Control Flow</text>
  
  <rect x="970" y="125" width="20" height="15" class="component frontend" />
  <text x="1050" y="135" class="flow-label">Component</text>
</svg>
