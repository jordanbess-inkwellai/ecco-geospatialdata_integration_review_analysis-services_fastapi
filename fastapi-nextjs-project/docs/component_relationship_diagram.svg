<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="900" viewBox="0 0 1200 900">
  <style>
    .title {
      font-family: Arial, sans-serif;
      font-size: 24px;
      font-weight: bold;
      text-anchor: middle;
    }
    .subtitle {
      font-family: Arial, sans-serif;
      font-size: 18px;
      font-weight: bold;
      text-anchor: middle;
    }
    .label {
      font-family: Arial, sans-serif;
      font-size: 14px;
      text-anchor: middle;
    }
    .small-label {
      font-family: Arial, sans-serif;
      font-size: 12px;
      text-anchor: middle;
    }
    .relationship-label {
      font-family: Arial, sans-serif;
      font-size: 10px;
      text-anchor: middle;
      fill: #333;
    }
    .component {
      stroke: #333;
      stroke-width: 2;
      fill: white;
    }
    .nextjs {
      fill: #61DAFB;
    }
    .qgis {
      fill: #9AE6B4;
    }
    .fastapi {
      fill: #FEB2B2;
    }
    .processing {
      fill: #FBD38D;
    }
    .data {
      fill: #B794F4;
    }
    .integration {
      fill: #90CDF4;
    }
    .relationship {
      stroke: #666;
      stroke-width: 1.5;
      fill: none;
      marker-end: url(#arrowhead);
    }
    .bidirectional {
      stroke: #666;
      stroke-width: 1.5;
      fill: none;
      marker-end: url(#arrowhead);
      marker-start: url(#arrowhead-start);
    }
    .dependency {
      stroke: #3182CE;
      stroke-width: 1.5;
      stroke-dasharray: 5,3;
      fill: none;
      marker-end: url(#dependency-arrowhead);
    }
    .background {
      fill: #F7FAFC;
      stroke: #E2E8F0;
      stroke-width: 1;
    }
  </style>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
    <marker id="arrowhead-start" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#666" />
    </marker>
    <marker id="dependency-arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182CE" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="900" fill="#F7FAFC" />

  <!-- Title -->
  <text x="600" y="40" class="title">Component Relationship Diagram</text>

  <!-- NextJS Components -->
  <rect x="100" y="100" width="150" height="60" rx="5" ry="5" class="component nextjs" />
  <text x="175" y="135" class="label">NextJS PWA</text>

  <rect x="100" y="200" width="150" height="60" rx="5" ry="5" class="component nextjs" />
  <text x="175" y="235" class="label">Script Repository</text>

  <rect x="100" y="300" width="150" height="60" rx="5" ry="5" class="component nextjs" />
  <text x="175" y="335" class="label">Workflow UI</text>

  <rect x="100" y="400" width="150" height="60" rx="5" ry="5" class="component nextjs" />
  <text x="175" y="435" class="label">Map Viewer</text>

  <!-- QGIS Components -->
  <rect x="100" y="550" width="150" height="60" rx="5" ry="5" class="component qgis" />
  <text x="175" y="585" class="label">QGIS Plugin</text>

  <rect x="100" y="650" width="150" height="60" rx="5" ry="5" class="component qgis" />
  <text x="175" y="685" class="label">API Client</text>

  <rect x="100" y="750" width="150" height="60" rx="5" ry="5" class="component qgis" />
  <text x="175" y="785" class="label">UI Components</text>

  <!-- FastAPI Components -->
  <rect x="350" y="100" width="150" height="60" rx="5" ry="5" class="component fastapi" />
  <text x="425" y="135" class="label">FastAPI Core</text>

  <rect x="350" y="200" width="150" height="60" rx="5" ry="5" class="component fastapi" />
  <text x="425" y="235" class="label">FastGeospatial</text>

  <rect x="350" y="300" width="150" height="60" rx="5" ry="5" class="component fastapi" />
  <text x="425" y="335" class="label">FastImporter</text>

  <rect x="350" y="400" width="150" height="60" rx="5" ry="5" class="component fastapi" />
  <text x="425" y="435" class="label">FateGeoFeature</text>

  <rect x="350" y="500" width="150" height="60" rx="5" ry="5" class="component fastapi" />
  <text x="425" y="535" class="label">FastGeoTable</text>

  <rect x="350" y="600" width="150" height="60" rx="5" ry="5" class="component fastapi" />
  <text x="425" y="635" class="label">FastGeoSuitability</text>

  <rect x="350" y="700" width="150" height="60" rx="5" ry="5" class="component fastapi" />
  <text x="425" y="735" class="label">Kestra API</text>

  <rect x="350" y="800" width="150" height="60" rx="5" ry="5" class="component fastapi" />
  <text x="425" y="835" class="label">DLT-Kestra API</text>

  <!-- Processing Components -->
  <rect x="600" y="100" width="150" height="60" rx="5" ry="5" class="component processing" />
  <text x="675" y="135" class="label">DuckDB</text>

  <rect x="600" y="200" width="150" height="60" rx="5" ry="5" class="component processing" />
  <text x="675" y="235" class="label">Tippecanoe</text>

  <rect x="600" y="300" width="150" height="60" rx="5" ry="5" class="component processing" />
  <text x="675" y="335" class="label">Kestra</text>

  <rect x="600" y="400" width="150" height="60" rx="5" ry="5" class="component processing" />
  <text x="675" y="435" class="label">DLT Pipelines</text>

  <rect x="600" y="500" width="150" height="60" rx="5" ry="5" class="component processing" />
  <text x="675" y="535" class="label">Marimo</text>

  <!-- Data Components -->
  <rect x="850" y="100" width="150" height="60" rx="5" ry="5" class="component data" />
  <text x="925" y="135" class="label">PostgreSQL/PostGIS</text>

  <rect x="850" y="200" width="150" height="60" rx="5" ry="5" class="component data" />
  <text x="925" y="235" class="label">Vector Tiles</text>

  <rect x="850" y="300" width="150" height="60" rx="5" ry="5" class="component data" />
  <text x="925" y="335" class="label">File Storage</text>

  <!-- Integration Components -->
  <rect x="850" y="400" width="150" height="60" rx="5" ry="5" class="component integration" />
  <text x="925" y="435" class="label">PocketBase</text>

  <rect x="850" y="500" width="150" height="60" rx="5" ry="5" class="component integration" />
  <text x="925" y="535" class="label">Martin MapLibre</text>

  <rect x="850" y="600" width="150" height="60" rx="5" ry="5" class="component integration" />
  <text x="925" y="635" class="label">Box.com</text>

  <rect x="850" y="700" width="150" height="60" rx="5" ry="5" class="component integration" />
  <text x="925" y="735" class="label">OGR_FDW</text>

  <!-- NextJS Internal Relationships -->
  <path d="M175 160 L175 200" class="relationship" />
  <text x="195" y="180" class="relationship-label">Uses</text>

  <path d="M175 260 L175 300" class="relationship" />
  <text x="195" y="280" class="relationship-label">Uses</text>

  <path d="M175 360 L175 400" class="relationship" />
  <text x="195" y="380" class="relationship-label">Uses</text>

  <!-- QGIS Internal Relationships -->
  <path d="M175 610 L175 650" class="relationship" />
  <text x="195" y="630" class="relationship-label">Uses</text>

  <path d="M175 710 L175 750" class="relationship" />
  <text x="195" y="730" class="relationship-label">Uses</text>

  <!-- FastAPI Internal Relationships -->
  <path d="M425 160 L425 200" class="relationship" />
  <text x="445" y="180" class="relationship-label">Includes</text>

  <path d="M425 260 L425 300" class="relationship" />
  <text x="445" y="280" class="relationship-label">Includes</text>

  <path d="M425 360 L425 400" class="relationship" />
  <text x="445" y="380" class="relationship-label">Includes</text>

  <path d="M425 460 L425 500" class="relationship" />
  <text x="445" y="480" class="relationship-label">Includes</text>

  <path d="M425 560 L425 600" class="relationship" />
  <text x="445" y="580" class="relationship-label">Includes</text>

  <path d="M425 660 L425 700" class="relationship" />
  <text x="445" y="680" class="relationship-label">Includes</text>

  <path d="M425 760 L425 800" class="relationship" />
  <text x="445" y="780" class="relationship-label">Includes</text>

  <!-- Processing Internal Relationships -->
  <path d="M675 360 L675 400" class="relationship" />
  <text x="695" y="380" class="relationship-label">Orchestrates</text>

  <!-- NextJS to FastAPI Relationships -->
  <path d="M250 130 L350 130" class="bidirectional" />
  <text x="300" y="120" class="relationship-label">API Calls</text>

  <path d="M250 230 L350 230" class="relationship" />
  <text x="300" y="220" class="relationship-label">Manages</text>

  <path d="M250 330 L350 730" class="relationship" />
  <text x="300" y="530" class="relationship-label">Manages Workflows</text>

  <path d="M250 430 L350 430" class="relationship" />
  <text x="300" y="420" class="relationship-label">Queries Features</text>

  <!-- QGIS to FastAPI Relationships -->
  <path d="M250 580 L350 130" class="bidirectional" />
  <text x="300" y="350" class="relationship-label">API Calls</text>

  <path d="M250 680 L350 230" class="relationship" />
  <text x="300" y="450" class="relationship-label">Geospatial Queries</text>

  <!-- FastAPI to Processing Relationships -->
  <path d="M500 130 L600 130" class="bidirectional" />
  <text x="550" y="120" class="relationship-label">Query Execution</text>

  <path d="M500 230 L600 230" class="relationship" />
  <text x="550" y="220" class="relationship-label">Tile Generation</text>

  <path d="M500 730 L600 330" class="bidirectional" />
  <text x="550" y="530" class="relationship-label">Workflow Management</text>

  <path d="M500 830 L600 430" class="relationship" />
  <text x="550" y="630" class="relationship-label">Pipeline Execution</text>

  <!-- Processing to Data Relationships -->
  <path d="M750 130 L850 130" class="bidirectional" />
  <text x="800" y="120" class="relationship-label">Data Access</text>

  <path d="M750 230 L850 230" class="relationship" />
  <text x="800" y="220" class="relationship-label">Generates</text>

  <path d="M750 430 L850 130" class="relationship" />
  <text x="800" y="280" class="relationship-label">Loads Data</text>

  <path d="M750 530 L850 330" class="relationship" />
  <text x="800" y="430" class="relationship-label">Analyzes Files</text>

  <!-- Integration Relationships -->
  <path d="M750 330 L850 430" class="bidirectional" />
  <text x="800" y="380" class="relationship-label">Real-time Updates</text>

  <path d="M750 230 L850 500" class="relationship" />
  <text x="800" y="365" class="relationship-label">Serves Tiles</text>

  <path d="M500 330 L850 600" class="relationship" />
  <text x="675" y="465" class="relationship-label">File Operations</text>

  <path d="M850 700 L850 130" class="relationship" />
  <text x="870" y="415" class="relationship-label">Foreign Data Access</text>

  <!-- Cross-Component Dependencies -->
  <path d="M250 430 L850 500" class="dependency" />
  <text x="550" y="465" class="relationship-label">Map Visualization</text>

  <path d="M250 330 L600 330" class="dependency" />
  <text x="425" y="315" class="relationship-label">Workflow Execution</text>

  <path d="M250 230 L600 430" class="dependency" />
  <text x="425" y="330" class="relationship-label">Pipeline Management</text>

  <path d="M600 130 L850 130" class="dependency" />
  <text x="725" y="115" class="relationship-label">Data Storage</text>

  <path d="M600 430 L850 130" class="dependency" />
  <text x="725" y="280" class="relationship-label">Target Database</text>

  <path d="M250 130 L850 430" class="dependency" />
  <text x="550" y="280" class="relationship-label">Real-time Updates</text>

  <!-- Legend -->
  <rect x="950" y="100" width="200" height="180" class="background" rx="5" ry="5" />
  <text x="1050" y="120" class="subtitle">Legend</text>
  
  <line x1="970" y1="140" x2="1000" y2="140" class="relationship" />
  <text x="1070" y="145" class="relationship-label">Direct Relationship</text>
  
  <line x1="970" y1="160" x2="1000" y2="160" class="bidirectional" />
  <text x="1070" y="165" class="relationship-label">Bidirectional Relationship</text>
  
  <line x1="970" y1="180" x2="1000" y2="180" class="dependency" />
  <text x="1070" y="185" class="relationship-label">Dependency</text>
  
  <rect x="970" y="200" width="20" height="15" class="component nextjs" />
  <text x="1070" y="210" class="relationship-label">NextJS Component</text>
  
  <rect x="970" y="220" width="20" height="15" class="component fastapi" />
  <text x="1070" y="230" class="relationship-label">FastAPI Component</text>
  
  <rect x="970" y="240" width="20" height="15" class="component processing" />
  <text x="1070" y="250" class="relationship-label">Processing Component</text>
  
  <rect x="970" y="260" width="20" height="15" class="component data" />
  <text x="1070" y="270" class="relationship-label">Data Component</text>
</svg>
